<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" width="100%" height="100%">
  <defs>
    <linearGradient id="bgGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#4A6B53" />
      <stop offset="50%" stop-color="#3A5642" />
      <stop offset="100%" stop-color="#222E26" />
    </linearGradient>
    <linearGradient id="logoGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#FFFDF9" />
      <stop offset="100%" stop-color="#EDEBE0" />
    </linearGradient>
    <filter id="softGlow" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="12" result="blur" />
      <feComposite in="SourceGraphic" in2="blur" operator="over" />
    </filter>
  </defs>
  
  <!-- Smooth rounded square base -->
  <rect x="32" y="32" width="448" height="448" rx="110" fill="url(#bgGrad)" />
  
  <!-- Elegant inner border -->
  <rect x="48" y="48" width="416" height="416" rx="94" fill="none" stroke="#6E9C7C" stroke-width="4" stroke-opacity="0.3" />
  
  <!-- Shield/Vault + Chat Bubble Symbol representing PromptVault -->
  <g transform="translate(0, 5)">
    <!-- Main shield container -->
    <path d="M256 120 C180 120 140 160 140 230 C140 310 180 340 210 360 L210 400 L256 375 L302 400 L302 360 C332 340 372 310 372 230 C372 160 332 120 256 120 Z" 
          fill="url(#logoGrad)" 
          filter="url(#softGlow)" />
          
    <!-- Sparkle/AI symbol in the center (Forest Green) -->
    <path d="M256 175 L265 210 L300 219 L265 228 L256 263 L247 228 L212 219 L247 210 Z" fill="#3A5642" />
    
    <!-- Vault Keyhole / Ring Detail -->
    <circle cx="256" cy="290" r="14" fill="#3A5642" />
    <path d="M251 298 L261 298 L265 320 L247 320 Z" fill="#3A5642" />
  </g>
</svg>
